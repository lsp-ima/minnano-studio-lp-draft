<body>
<div id="pwgate" style="position:fixed;inset:0;z-index:99999;background:#111318;color:#fff;display:flex;align-items:center;justify-content:center;flex-direction:column;font-family:sans-serif;padding:20px;text-align:center;">
<div style="font-size:14px;margin-bottom:14px;color:#ccc;">パスワードを入力してください</div>
<input id="pwinput" type="password" style="padding:12px 14px;border-radius:8px;border:none;font-size:16px;width:220px;text-align:center;" autofocus>
<button id="pwbtn" type="button" style="margin-top:14px;padding:11px 28px;border-radius:20px;border:none;background:#06C755;color:#fff;font-weight:700;font-size:14px;">開く</button>
<div id="pwerr" style="color:#ff8080;font-size:12px;margin-top:12px;display:none;">パスワードが違います</div>
</div>
<script>
(function(){
  var PW = "minnano2026";
  var gate = document.getElementById('pwgate');
  var input = document.getElementById('pwinput');
  var btn = document.getElementById('pwbtn');
  var err = document.getElementById('pwerr');
  if (sessionStorage.getItem('mns_ok') === '1') { gate.remove(); return; }
  document.documentElement.style.overflow = 'hidden';
  function tryUnlock(){
    if (input.value === PW) {
      sessionStorage.setItem('mns_ok','1');
      gate.remove();
      document.documentElement.style.overflow = '';
    } else {
      err.style.display = 'block';
    }
  }
  btn.addEventListener('click', tryUnlock);
  input.addEventListener('keydown', function(e){ if(e.key === 'Enter') tryUnlock(); });
})();
</script>
